<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>游戏开发起点 - Hello World</title>
    <style>
        /* 基础样式重置 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            /* 这里设置了深色背景，符合游戏开发的视觉习惯 */
            background-color: #1a1a1a;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            
            /* 使用Flexbox让内容完全居中 */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        #game-container {
            text-align: center;
        }

        h1 {
            font-size: 5rem;
            letter-spacing: 5px;
            /* 添加简单的文字阴影效果 */
            text-shadow: 0 0 20px rgba(0, 255, 255, 0.7);
            color: #00d4ff;
        }

        p {
            margin-top: 20px;
            color: #888;
            font-size: 1.2rem;
        }

        /* 游戏开发中常用的Canvas容器样式（预留） */
        #canvas-container {
            margin-top: 30px;
            border: 2px solid #333;
            display: none; /* 默认隐藏，等你开始写游戏逻辑时开启 */
        }
    </style>
</head>
<body>

    <div id="game-container">
        <h1>Hello World</h1>
        <p>游戏引擎已就绪，准备开始你的创作。</p>
        
        <!-- 这里是后续放置游戏画布的地方 -->
        <div id="canvas-container">
            <canvas id="gameCanvas"></canvas>
        </div>
    </div>

    <script>
        /**
         * 游戏逻辑初始化
         * 作为开发者，这里是放置游戏循环、输入处理和渲染逻辑的地方
         */
        document.addEventListener('DOMContentLoaded', () => {
            console.log("游戏环境已加载成功！");
            
            // 在这里可以开始编写你的游戏代码
            // 例如：初始化Canvas、创建玩家对象等
        });
    </script>
</body>
</html>
