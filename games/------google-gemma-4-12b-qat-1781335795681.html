<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>经典贪吃蛇游戏</title>
    <style>
        /* CSS 样式：负责页面的视觉呈现 */
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #2c3e50;
            color: white;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
        }

        #game-container {
            text-align: center;
            position: relative;
        }

        canvas {
            border: 5px solid #ecf0f1;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
            background-color: #000;
        }

        #score-board {
            font-size: 24px;
            margin-bottom: 10px;
        }

        /* 游戏结束遮罩层 */
        #game-over {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: rgba(0, 0, 0, 0.85);
            padding: 20px;
            border-radius: 10px;
            display: none; /* 默认隐藏 */
            border: 2px solid #e74c3c;
        }

        button {
            padding: 10px 20px;
            font-size: 16px;
            background-color: #27ae60;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.3s;
        }

        button:hover {
            background-color: #2ecc71;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="score-board">得分: <span id="score">0</span></div>
        <canvas id="snakeGame" width="400" height="400"></canvas>
        
        <!-- 游戏结束界面 -->
        <div id="game-over">
            <h2 style="color: #e74c3c;">游戏结束!</h2>
            <p>最终得分: <span id="final-score">0</span></p>
            <button onclick="resetGame()">重新开始</button>
        </div>
    </div>

    <script>
        /* JavaScript 逻辑：负责游戏核心功能 */
        const canvas = document.getElementById('snakeGame');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');
        const finalScoreElement = document.getElementById('final-score');
        const gameOverScreen = document.getElementById('game-over');

        // 游戏配置
        const gridSize = 20; // 每个格子的像素大小
        const tileCount = canvas.width / gridSize; // 网格数量 (20x20)
        
        let score = 0;
        let dx = 0; // 水平速度
        let dy = 0; // 垂直速度
        let snake = [];
        let food = { x: 10, y: 10 };
        let gameSpeed = 100; // 游戏速度（毫秒）
        let gameLoop;
        let isGameOver = false;

        // 初始化蛇的初始位置
        function initSnake() {
            // 蛇身数组，每个元素是一个坐标对象
            snake = [
                { x: 10, y: 10 },
                { x: 9, y: 10 },
                { x: 8, y: 10 }
            ];
            dx = 1; // 初始向右移动
            dy = 0;
        }

        // 监听键盘输入
        document.addEventListener('keydown', changeDirection);

        function changeDirection(event) {
            const LEFT = 37;
            const UP = 38;
            const RIGHT = 39;
            const DOWN = 40;

            const keyPressed = event.keyCode;
            
            // 防止蛇直接掉头（例如向上时不能向下）
            if (keyPressed === LEFT && dx === 0) {
                dx = -1;
                dy = 0;
            } else if (keyPressed === UP && dy === 0) {
                dx = 0;
                dy = -1;
            } else if (keyPressed === RIGHT && dx === 0) {
                dx = 1;
                dy = 0;
            } else if (keyPressed === DOWN && dy === 0) {
                dx = 0;
                dy = 1;
            }
        }

        // 生成随机食物（确保食物不在蛇身上）
        function generateFood() {
            food.x = Math.floor(Math.random() * tileCount);
            food.y = Math.floor(Math.random() * tileCount);

            // 检查食物是否生成在蛇的身体上
            snake.forEach(part => {
                if (part.x === food.x && part.y === food.y) {
                    generateFood();
                }
            });
        }

        // 核心渲染函数
        function draw() {
            if (isGameOver) return;

            // 1. 清除画布
            ctx.fillStyle = 'black';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 2. 绘制蛇
            snake.forEach((part, index) => {
                // 头部颜色不同
                ctx.fillStyle = (index === 0) ? '#2ecc71' : '#27ae60';
                ctx.strokeStyle = '#2c3e50';
                ctx.fillRect(part.x * gridSize, part.y * gridSize, gridSize, gridSize);
                ctx.strokeRect(part.x * gridSize, part.y * gridSize, gridSize, gridSize);
            });

            // 3. 绘制食物
            ctx.fillStyle = '#e74c3c';
            ctx.fillRect(food.x * gridSize, food.y * gridSize, gridSize, gridSize);

            // 4. 更新蛇的位置
            moveSnake();

            // 5. 碰撞检测
            checkCollisions();

            // 6. 更新得分
            scoreElement.innerText = score;
        }

        function moveSnake() {
            // 创建新的头部位置
            const head = { x: snake[0].x + dx, y: snake[0].y + dy };
            
            // 将新头部插入数组
            snake.unshift(head);

            // 检查是否吃到食物
            if (head.x === food.x && head.y === food.y) {
                score += 10;
                generateFood();
                // 不执行 pop()，所以蛇会变长
            } else {
                // 没吃到食物，移除尾部
                snake.pop();
            }
        }

        function checkCollisions() {
            const head = snake[0];

            // 撞墙检测
            if (head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount) {
                gameOver();
            }

            // 撞到自己检测
            for (let i = 1; i < snake.length; i++) {
                if (head.x === snake[i].x && head.y === snake[i].y) {
                    gameOver();
                }
            }
        }

        function gameOver() {
            isGameOver = true;
            clearInterval(gameLoop);
            finalScoreElement.innerText = score;
            gameOverScreen.style.display = 'block';
        }

        function resetGame() {
            // 重置所有状态
            score = 0;
            scoreElement.innerText = score;
            isGameOver = false;
            gameOverScreen.style.display = 'none';
            dx = 1;
            dy = 0;
            
            initSnake();
            generateFood();
            
            // 重新启动循环
            clearInterval(gameLoop);
            gameLoop = setInterval(draw, gameSpeed);
        }

        // 启动游戏
        initSnake();
        generateFood();
        gameLoop = setInterval(draw, gameSpeed);

    </script>
</body>
</html>
