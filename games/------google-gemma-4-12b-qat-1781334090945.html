<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>经典贪吃蛇 - HTML5 Game</title>
    <style>
        /* CSS 样式设计 */
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #2c3e50; /* 深色背景 */
            color: white;
            font-family: 'Arial', sans-serif;
            flex-direction: column;
        }

        h1 {
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        #game-container {
            position: relative;
            border: 5px solid #ecf0f1;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            border-radius: 10px;
            overflow: hidden;
        }

        canvas {
            display: block;
            background-color: #000; /* 画布背景 */
        }

        #score-board {
            font-size: 24px;
            margin-bottom: 10px;
        }

        /* 游戏结束遮罩层 */
        #game-over {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            background: rgba(0, 0, 0, 0.8);
            padding: 20px;
            border-radius: 10px;
            display: none; /* 初始隐藏 */
        }

        button {
            padding: 10px 20px;
            font-size: 18px;
            cursor: pointer;
            background-color: #27ae60;
            color: white;
            border: none;
            border-radius: 5px;
            transition: background 0.3s;
        }

        button:hover {
            background-color: #2ecc71;
        }
    </style>
</head>
<body>

    <h1>经典贪吃蛇</h1>
    <div id="score-board">分数: <span id="score">0</span></div>
    
    <div id="game-container">
        <canvas id="gameCanvas" width="400" height="400"></canvas>
        
        <!-- 游戏结束界面 -->
        <div id="game-over">
            <h2 style="color: #e74c3c;">游戏结束!</h2>
            <p>最终得分: <span id="final-score">0</span></p>
            <button onclick="resetGame()">重新开始</button>
        </div>
    </div>

    <p>使用方向键 (↑ ↓ ← →) 控制移动</p>

    <script>
        /**
         * JavaScript 游戏逻辑
         */
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const scoreElement = document.getElementById("score");
        const finalScoreElement = document.getElementById("final-score");
        const gameOverScreen = document.getElementById("game-over");

        // 游戏配置
        const box = 20; // 每个格子的像素大小
        let score = 0;
        let gameSpeed = 100; // 游戏速度 (毫秒)
        let gameInterval;

        // 蛇的初始状态
        let snake = [
            { x: 9 * box, y: 10 * box }, // 头部
            { x: 8 * box, y: 10 * box }, // 身体1
            { x: 7 * box, y: 10 * box }  // 身体2
        ];

        let food = {
            x: Math.floor(Math.random() * 19 + 1) * box,
            y: Math.floor(Math.random() * 19 + 1) * box
        };

        let d = "RIGHT"; // 初始移动方向
        let canChangeDirection = true; // 防止快速按键导致反向撞击

        // 监听键盘事件
        document.addEventListener("keydown", directionKeyHandler);

        function directionKeyHandler(event) {
            const key = event.keyCode;
            // 只有当可以改变方向时才处理输入
            if (canChangeDirection) {
                if (key === 37 && d !== "RIGHT") d = "LEFT";  // 左
                else if (key === 38 && d !== "DOWN") d = "UP";   // 上
                else if (key === 39 && d !== "LEFT") d = "RIGHT"; // 右
                else if (key === 40 && d !== "UP") d = "DOWN";    // 下
                
                canChangeDirection = false; // 限制单次按键仅触发一次方向改变
            }
        }

        // 绘制函数
        function draw() {
            // 清除画布
            ctx.fillStyle = "black";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 绘制蛇
            for (let i = 0; i < snake.length; i++) {
                ctx.fillStyle = (i === 0) ? "#2ecc71" : "#27ae60"; // 头部颜色不同
                ctx.strokeStyle = "#000";
                ctx.lineWidth = 2;
                ctx.fillRect(snake[i].x, snake[i].y, box, box);
                ctx.strokeRect(snake[i].x, snake[i].y, box, box);
            }

            // 绘制食物
            ctx.fillStyle = "#e74c3c";
            ctx.fillRect(food.x, food.y, box, box);

            // 获取旧的头部位置
            let snakeX = snake[0].x;
            let snakeY = snake[0].y;

            // 根据方向移动头部
            if (d === "LEFT") snakeX -= box;
            if (d === "UP") snakeY -= box;
            if (d === "RIGHT") snakeX += box;
            if (d === "DOWN") snakeY += box;

            // 碰撞检测：撞到墙壁
            if (snakeX < 0 || snakeX >= canvas.width || snakeY < 0 || snakeY >= canvas.height) {
                gameOver();
                return;
            }

            // 碰撞检测：撞到自己的身体
            for (let i = 1; i < snake.length; i++) {
                if (snakeX === snake[i].x && snakeY === snake[i].y) {
                    gameOver();
                    return;
                }
            }

            // 移动逻辑处理
            // 如果蛇吃到食物
            if (snakeX === food.x && snakeY === food.y) {
                score++;
                scoreElement.innerText = score;
                // 生成新食物
                food = {
                    x: Math.floor(Math.random() * 19 + 1) * box,
                    y: Math.floor(Math.random() * 19 + 1) * box
                };
                // 蛇变长（不弹出尾部）
            } else {
                // 移除尾部
                snake.pop();
            }

            // 添加新头部
            let newHead = { x: snakeX, y: snakeY };
            snake.unshift(newHead);

            // 每一帧结束时，允许下一次方向改变
            setTimeout(() => {
                canChangeDirection = true;
                draw();
            }, gameSpeed);
        }

        // 游戏结束逻辑
        function gameOver() {
            clearInterval(gameInterval);
            finalScoreElement.innerText = score;
            gameOverScreen.style.display = "block";
        }

        // 重置游戏
        function resetGame() {
            score = 0;
            scoreElement.innerText = score;
            snake = [
                { x: 9 * box, y: 10 * box },
                { x: 8 * box, y: 10 * box },
                { x: 7 * box, y: 10 * box }
            ];
            d = "RIGHT";
            gameOverScreen.style.display = "none";
            
            // 清除之前的定时器并重新开始
            if (gameInterval) clearInterval(gameInterval);
            // 这里我们直接在 draw 函数里用 setTimeout 递归，所以不需要额外的 setInterval
            draw();
        }

        // 启动游戏
        draw();

    </script>
</body>
</html>
