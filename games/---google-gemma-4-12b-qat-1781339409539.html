<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello World - Game Dev Edition</title>
    <style>
        /* 基础样式重置 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #1a1a2e; /* 深色游戏风格背景 */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        /* 游戏容器 */
        #game-container {
            text-align: center;
            padding: 2rem;
            border: 4px solid #0f3460;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
            transition: transform 0.3s ease;
        }

        #game-container:hover {
            transform: scale(1.05);
            border-color: #e94560;
        }

        /* 文字样式 */
        h1 {
            color: #e94560;
            font-size: 4rem;
            margin-bottom: 1rem;
            text-shadow: 2px 2px 10px rgba(233, 69, 96, 0.5);
            animation: fadeIn 2s ease-in-out;
        }

        p {
            color: #ffffff;
            font-size: 1.2rem;
            letter-spacing: 2px;
            margin-bottom: 2rem;
        }

        /* 交互按钮 */
        button {
            padding: 12px 30px;
            font-size: 1rem;
            font-weight: bold;
            color: white;
            background-color: #e94560;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: background 0.3s, transform 0.1s;
        }

        button:hover {
            background-color: #ff2e63;
        }

        button:active {
            transform: scale(0.95);
        }

        /* 简单的入场动画 */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 粒子效果占位 (可选) */
        .particle {
            position: absolute;
            background: white;
            border-radius: 50%;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <h1 id="main-text">Hello World</h1>
        <p>游戏引擎已就绪</p>
        <button id="action-btn">点击开始</button>
    </div>

    <script>
        /**
         * 游戏逻辑脚本
         */
        const btn = document.getElementById('action-btn');
        const text = document.getElementById('main-text');

        // 点击交互
        btn.addEventListener('click', () => {
            // 改变文字内容
            text.innerText = "欢迎来到我的游戏世界！";
            text.style.color = "#4ecca3";
            
            // 按钮反馈
            btn.innerText = "已激活";
            btn.disabled = true;
            btn.style.backgroundColor = "#4ecca3";
            btn.style.cursor = "default";

            // 控制台日志（开发者常用）
            console.log("Game Initialized Successfully!");
            
            // 简单的震动效果（移动端）
            if (navigator.vibrate) {
                navigator.vibrate(200);
            }
        });

        // 创建简单的随机背景粒子
        function createParticles() {
            const container = document.body;
            for (let i = 0; i < 20; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                const size = Math.random() * 5 + 2 + 'px';
                p.style.width = size;
                p.style.height = size;
                p.style.left = Math.random() * 100 + 'vw';
                p.style.top = Math.random() * 100 + 'vh';
                p.style.opacity = Math.random();
                container.appendChild(p);
            }
        }

        createParticles();
    </script>
</body>
</html>
