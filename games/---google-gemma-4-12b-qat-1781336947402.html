<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello World - Game Dev Demo</title>
    <style>
        /* 基础样式重置 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1a2e; /* 深色游戏背景色 */
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* 游戏容器 */
        #game-container {
            text-align: center;
            padding: 50px;
            border: 4px solid #16213e;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.05);
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.5);
            transition: transform 0.3s ease;
        }

        #game-container:hover {
            transform: scale(1.02);
        }

        h1 {
            font-size: 4rem;
            margin-bottom: 20px;
            text-shadow: 2px 2px 10px #e94560; /* 霓虹灯效果 */
            letter-spacing: 5px;
        }

        p {
            font-size: 1.2rem;
            color: #95a5a6;
            margin-bottom: 30px;
        }

        /* 互动按钮 */
        #action-btn {
            padding: 15px 30px;
            font-size: 1.2rem;
            background-color: #e94560;
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 15px rgba(233, 69, 96, 0.4);
        }

        #action-btn:hover {
            background-color: #ff6b81;
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(233, 69, 96, 0.6);
        }

        #action-btn:active {
            transform: translateY(1px);
        }
    </style>
</head>
<body>

    <div id="game-container">
        <h1>Hello World</h1>
        <p>这是一个由专业开发者构建的初始界面</p>
        <button id="action-btn">点击交互</button>
    </div>

    <script>
        /**
         * 游戏逻辑初始化
         */
        document.addEventListener('DOMContentLoaded', () => {
            const btn = document.getElementById('action-btn');
            
            // 点击事件逻辑
            btn.addEventListener('click', () => {
                // 简单的交互反馈
                const title = document.querySelector('h1');
                title.innerText = "Welcome!";
                title.style.color = "#4ecca3";
                
                console.log("游戏逻辑已启动：用户点击了按钮。");
                
                // 可以在这里添加后续的游戏逻辑，如：
                // 1. 初始化游戏引擎 (如 Phaser.js 或 PixiJS)
                // 2. 播放音效
                // 3. 跳转到主菜单
            });
        });
    </script>
</body>
</html>
